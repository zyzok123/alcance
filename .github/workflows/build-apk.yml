name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: v0.1.${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependencias
        run: npm ci

      - name: Build web (con versión inyectada)
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ env.VERSION }}

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK debug
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "alcance-${{ env.VERSION }}.apk"

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Alcance ${{ env.VERSION }}
          files: alcance-${{ env.VERSION }}.apk
          body: |
            APK debug instalable (sideload).

            **Instalar:** descarga `alcance-${{ env.VERSION }}.apk` desde el
            teléfono, ábrelo y acepta "instalar apps de origen desconocido".
